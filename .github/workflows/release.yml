name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build release artifacts and publish
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            libsqlite3-dev \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf \
            rpm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build Linux bundles
        run: npm run tauri build -- --bundles deb,rpm

      - name: Prepare portable Linux tarball and AUR metadata
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
          PACKAGE_NAME: faden
          BASE_NAME: faden
          DISPLAY_NAME: Faden
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          PORTABLE_ROOT="dist/release/faden-${VERSION}-linux-x86_64"
          mkdir -p "$PORTABLE_ROOT/usr/bin" "$PORTABLE_ROOT/usr/share/pixmaps" "$PORTABLE_ROOT/usr/share/licenses/faden" "$PORTABLE_ROOT/usr/share/applications"

          install -Dm755 src-tauri/target/release/faden "$PORTABLE_ROOT/usr/bin/faden"
          install -Dm644 src-tauri/icons/128x128.png "$PORTABLE_ROOT/usr/share/pixmaps/faden.png"
          install -Dm644 LICENSE "$PORTABLE_ROOT/usr/share/licenses/faden/LICENSE"
          cat > "$PORTABLE_ROOT/usr/share/applications/faden.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Faden
          Comment=Desktop app for qualitative interview research
          Exec=faden
          Icon=faden
          Terminal=false
          Categories=Science;Office;
          Keywords=qualitative;research;interview;analysis;transcription;coding;
          StartupWMClass=faden
          EOF

          tar -C dist/release -czf "dist/release/faden-${VERSION}-linux-x86_64.tar.gz" "faden-${VERSION}-linux-x86_64"
          SOURCE_SHA256="$(sha256sum "dist/release/faden-${VERSION}-linux-x86_64.tar.gz" | awk '{print $1}')"

          SOURCE_NAME="faden-${VERSION}-linux-x86_64.tar.gz" \
          SOURCE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/faden-${VERSION}-linux-x86_64.tar.gz" \
          SOURCE_SHA256="$SOURCE_SHA256" \
          ./scripts/generate-aur-package.sh

          tar -C dist/aur -czf "dist/aur/faden-${VERSION}-aur.tar.gz" faden

      - name: Collect release asset paths
        id: assets
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          DEB_PATH="$(find src-tauri/target/release/bundle/deb -maxdepth 1 -type f -name '*.deb' | head -n1)"
          RPM_PATH="$(find src-tauri/target/release/bundle/rpm -maxdepth 1 -type f -name '*.rpm' | head -n1)"

          if [[ -z "$DEB_PATH" || -z "$RPM_PATH" ]]; then
            echo "Expected .deb and .rpm bundles were not produced" >&2
            exit 1
          fi

          {
            echo "deb_path=$DEB_PATH"
            echo "rpm_path=$RPM_PATH"
            echo "portable_path=dist/release/faden-${VERSION}-linux-x86_64.tar.gz"
            echo "aur_bundle_path=dist/aur/faden-${VERSION}-aur.tar.gz"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes "Automated release for ${GITHUB_REF_NAME}."
          fi

          gh release upload "${GITHUB_REF_NAME}" \
            "${{ steps.assets.outputs.deb_path }}" \
            "${{ steps.assets.outputs.rpm_path }}" \
            "${{ steps.assets.outputs.portable_path }}" \
            dist/aur/faden/PKGBUILD#PKGBUILD \
            dist/aur/faden/.SRCINFO#.SRCINFO \
            "${{ steps.assets.outputs.aur_bundle_path }}" \
            --clobber

      - name: Configure SSH for AUR
        shell: bash
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF

      - name: Commit and push AUR package files
        shell: bash
        env:
          AUR_REPO: aur@aur.archlinux.org:faden.git
        run: |
          set -euo pipefail
          git clone "$AUR_REPO" aur-faden
          cp dist/aur/faden/PKGBUILD aur-faden/PKGBUILD
          cp dist/aur/faden/.SRCINFO aur-faden/.SRCINFO

          cd aur-faden
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

          if [ -z "$(git status --short -- PKGBUILD .SRCINFO)" ]; then
            echo "No AUR changes to push"
            exit 0
          fi

          git add PKGBUILD .SRCINFO
          git commit -m "Update faden to ${GITHUB_REF_NAME}"
          git push origin HEAD
